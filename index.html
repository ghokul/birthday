<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Happy Birthday Viji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0716; }
    body { display: flex; align-items: center; justify-content: center; font-family: 'Fredoka', sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #replay {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 34px;
      border-radius: 999px;
      border: 1px solid rgba(255, 214, 0, 0.35);
      background: linear-gradient(135deg, rgba(255, 110, 199, 0.14), rgba(123, 47, 247, 0.14));
      color: rgba(255, 235, 190, 0.9);
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 18px rgba(255, 110, 199, 0.15);
      z-index: 10;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease;
    }
    #replay:active { transform: translateX(-50%) scale(0.96); }

    /* Music Control Button */
    #musicBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.5);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      color: #FFD700;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }
    #musicBtn:active { transform: scale(0.9); }
    #musicBtn.playing { 
      border-color: #00FF88;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    }
  </style>
</head>
<body>
  <!-- Music Button -->
  <button id="musicBtn" onclick="toggleMusic()">🔇</button>

  <canvas id="c"></canvas>
  <button id="replay" onclick="restart()">✨ Replay</button>

  <!-- Audio Element -->
  <audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ===================== MUSIC CONTROLS =====================
    let isMusicPlaying = false;
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    function toggleMusic() {
      if (isMusicPlaying) {
        music.pause();
        musicBtn.textContent = '🔇';
        musicBtn.classList.remove('playing');
      } else {
        music.play().catch(e => console.log('Auto-play prevented'));
        musicBtn.textContent = '🔊';
        musicBtn.classList.add('playing');
      }
      isMusicPlaying = !isMusicPlaying;
    }

    // Try to play on first user tap (required for mobile)
    document.addEventListener('click', function initMusic() {
      if (!isMusicPlaying) {
        music.play().then(() => {
          isMusicPlaying = true;
          musicBtn.textContent = '🔊';
          musicBtn.classList.add('playing');
        }).catch(() => {});
        document.removeEventListener('click', initMusic);
      }
    }, { once: true });

    // ===================== CANVAS CODE =====================
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();

    window.addEventListener('resize', () => {
      resize();
      buildCake();
      layoutText();
      if (typeof restart === 'function') restart();
    });

    const W = () => canvas.width;
    const H = () => canvas.height;

    const COLORS = ['#FFD400', '#FF6EC7', '#FF3D5A', '#7B2FF7', '#00D4FF', '#00E5A0'];

    // ---- cake silhouette ----
    const CAKE_VERTS = [
      [-70, 0], [70, 0], [70, 28], [45, 28], [45, 50], [4, 50], [4, 78],
      [3, 83], [1.5, 90], [0, 97], [-1.5, 90], [-3, 83], [-4, 78],
      [-45, 50], [-45, 28], [-70, 28]
    ];

    const TOTAL_PTS = 700;
    let cakePath = [];
    let cx = 0, cy = 0, cakeScale = 1;
    let sprinkles = [];

    function tX(x, y) {
      return { x: cx + x * cakeScale, y: cy - y * cakeScale };
    }

    function randColor() {
      const idx = Math.floor(Math.random() * COLORS.length);
      return { rgb: COLORS[idx], hex: COLORS[idx] };
    }

    function buildSprinkles() {
      sprinkles = [];
      for (let i = 0; i < 44; i++) {
        sprinkles.push({
          x: (Math.random() * 136) - 68,
          y: (Math.random() * 20) + 3,
          color: randColor(),
          r: Math.random() * 1.6 + 1,
          rot: Math.random() * Math.PI
        });
      }
      for (let i = 0; i < 26; i++) {
        let x = (Math.random() * 82) - 41;
        if (Math.abs(x) < 7) x += (x < 0 ? -8 : 8);
        sprinkles.push({
          x: x,
          y: (Math.random() * 16) + 30,
          color: randColor(),
          r: Math.random() * 1.5 + 0.9,
          rot: Math.random() * Math.PI
        });
      }
    }

    function buildCake() {
      cakePath = [];
      cakeScale = Math.min(W(), H()) * 0.0042;
      cx = W() / 2;
      cy = H() * 0.56;
      buildSprinkles();

      const verts = CAKE_VERTS.map(([x, y]) => [x, y]);
      const n = verts.length;
      const segLens = [];
      let total = 0;
      for (let i = 0; i < n; i++) {
        const a = verts[i], b = verts[(i + 1) % n];
        const d = Math.hypot(b[0] - a[0], b[1] - a[1]);
        segLens.push(d);
        total += d;
      }

      for (let i = 0; i < TOTAL_PTS; i++) {
        const target = (i / TOTAL_PTS) * total;
        let acc = 0, segIdx = 0;
        while (acc + segLens[segIdx] < target && segIdx < n - 1) {
          acc += segLens[segIdx];
          segIdx++;
        }
        const a = verts[segIdx], b = verts[(segIdx + 1) % n];
        const segT = segLens[segIdx] === 0 ? 0 : (target - acc) / segLens[segIdx];
        const dx = a[0] + (b[0] - a[0]) * segT;
        const dy = a[1] + (b[1] - a[1]) * segT;
        cakePath.push({
          x: cx + dx * cakeScale,
          y: cy - dy * cakeScale
        });
      }
    }
    buildCake();

    // ---- color helpers ----
    function hexToRgb(hex) {
      return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }

    function lerpColor(a, b, t) {
      const [r1, g1, b1] = hexToRgb(a), [r2, g2, b2] = hexToRgb(b);
      return [Math.round(r1 + (r2 - r1) * t), Math.round(g1 + (g2 - g1) * t), Math.round(b1 + (b2 - b1) * t)];
    }

    function colorAt(frac) {
      const n = COLORS.length - 1;
      const pos = Math.min(Math.max(frac, 0), 0.9999) * n;
      const i = Math.floor(pos);
      const [r, g, b] = lerpColor(COLORS[i], COLORS[i + 1], pos - i);
      return { rgb: `rgb(${r},${g},${b})`, r, g, b };
    }

    // ---- particles ----
    class Particle {
      constructor(x, y, color, type = 'trail') {
        this.x = x; this.y = y; this.type = type;
        const angle = Math.random() * Math.PI * 2;
        const speed = type === 'burst' ? Math.random() * 4.5 + 1.5 : Math.random() * 1.6 + 0.2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = type === 'burst' ? Math.random() * 0.016 + 0.008 : Math.random() * 0.007 + 0.002;
        this.size = type === 'burst' ? Math.random() * 3.2 + 1 : Math.random() * 2.2 + 0.4;
        this.color = color;
        this.twinkle = Math.random() > 0.6;
        this.twinkleSpeed = Math.random() * 0.15 + 0.05;
        this.twinklePhase = Math.random() * Math.PI * 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.type === 'burst' ? 0.07 : 0.01;
        this.vx *= 0.993;
        this.life -= this.decay;
      }
      draw(frame) {
        if (this.life <= 0) return;
        const alpha = this.twinkle ?
          this.life * (0.5 + 0.5 * Math.sin(frame * this.twinkleSpeed + this.twinklePhase)) :
          this.life * 0.85;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.fillStyle = this.color.rgb || this.color;
        ctx.shadowBlur = this.type === 'burst' ? 12 : 6;
        ctx.shadowColor = this.color.rgb || this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.size * this.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- stars ----
    const STARS = Array.from({ length: 120 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.4 + 0.1,
      speed: Math.random() * 0.02 + 0.005
    }));

    function drawStars(frame) {
      for (const s of STARS) {
        const a = s.alpha * (0.5 + 0.5 * Math.sin(frame * s.speed));
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x * W(), s.y * H(), s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---- confetti ----
    class Confetti {
      constructor() { this.reset(true); }
      reset(initial) {
        this.x = Math.random() * W();
        this.y = initial ? Math.random() * H() : -10 - Math.random() * 40;
        this.w = Math.random() * 6 + 4;
        this.h = this.w * 0.4;
        this.vy = Math.random() * 1.6 + 1;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.15;
        this.color = randColor();
        this.sway = Math.random() * Math.PI * 2;
      }
      update() {
        this.y += this.vy;
        this.x += this.vx + Math.sin(this.sway) * 0.6;
        this.sway += 0.05;
        this.rot += this.rotSpeed;
        if (this.y > H() + 20) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = this.color.rgb;
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.restore();
      }
    }

    let confetti = [];
    function initConfetti() {
      confetti = Array.from({ length: 70 }, () => new Confetti());
    }

    // ---- balloons ----
    class Balloon {
      constructor() { this.reset(true); }
      reset(initial) {
        this.x = Math.random() * W();
        this.y = initial ? H() + Math.random() * H() : H() + Math.random() * 100;
        this.size = Math.random() * 22 + 22;
        this.vy = -(Math.random() * 0.5 + 0.3);
        this.color = randColor();
        this.phase = Math.random() * Math.PI * 2;
        this.swaySpeed = Math.random() * 0.02 + 0.01;
        this.baseX = this.x;
      }
      update() {
        this.y += this.vy;
        this.phase += this.swaySpeed;
        this.x = this.baseX + Math.sin(this.phase) * 30;
        if (this.y < -80) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = this.color.rgb;
        ctx.shadowBlur = 14;
        ctx.shadowColor = this.color.rgb;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.size * 0.78, this.size, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.size);
        ctx.lineTo(this.x, this.y + this.size + 26);
        ctx.stroke();
        ctx.restore();
      }
    }

    let balloons = [];
    function initBalloons() {
      balloons = Array.from({ length: 7 }, () => new Balloon());
    }

    // ---- fireworks ----
    let fireworks = [];
    let particles = [];

    function spawnFireworkBurst(x, y, color) {
      const count = 46;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, 'burst'));
      }
    }

    function spawnTrailPoint(x, y, color) {
      particles.push(new Particle(x + (Math.random() - 0.5) * 3, y, color, 'trail'));
    }

    class Firework {
      constructor() {
        this.x = W() * 0.15 + Math.random() * W() * 0.7;
        this.y = H() + 10;
        this.targetY = H() * 0.14 + Math.random() * H() * 0.28;
        this.vy = -(Math.random() * 3 + 7);
        this.color = randColor();
        this.exploded = false;
      }
      update(frame) {
        if (this.exploded) return true;
        this.y += this.vy;
        if (frame % 2 === 0) spawnTrailPoint(this.x, this.y, this.color);
        if (this.y <= this.targetY) {
          this.exploded = true;
          spawnFireworkBurst(this.x, this.y, randColor());
          return true;
        }
        return false;
      }
    }

    // ---- pulse ring ----
    let pulseRadius = 0, pulseAlpha = 0, pulsing = false;

    function drawPulse() {
      if (!pulsing) return;
      pulseRadius += 2.6;
      pulseAlpha -= 0.007;
      if (pulseAlpha <= 0) { pulsing = false; pulseRadius = 0; return; }
      const c = colorAt(0.15);
      ctx.save();
      ctx.strokeStyle = c.rgb;
      ctx.lineWidth = 2;
      ctx.globalAlpha = pulseAlpha;
      ctx.shadowBlur = 20;
      ctx.shadowColor = c.rgb;
      ctx.beginPath();
      ctx.arc(cx, cy - 15, pulseRadius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ---- cake drawing ----
    function drawCakeOutline(pts) {
      if (pts < 2) return;
      const SEG = 4;
      for (let i = 0; i < pts - SEG; i += SEG) {
        const c = colorAt(i / TOTAL_PTS);
        ctx.save();
        ctx.strokeStyle = c.rgb;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 22;
        ctx.shadowColor = c.rgb;
        ctx.globalAlpha = 0.95;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(cakePath[i].x, cakePath[i].y);
        for (let j = i + 1; j <= Math.min(i + SEG, pts - 1); j++) {
          ctx.lineTo(cakePath[j].x, cakePath[j].y);
        }
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.shadowBlur = 42;
        ctx.globalAlpha = 0.32;
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawHead(x, y, color) {
      for (let r = 36; r >= 4; r -= 6) {
        const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, `rgba(${color.r},${color.g},${color.b},${0.07 * (36 - r) / 36 + 0.02})`);
        grad.addColorStop(1, 'transparent');
        ctx.save();
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 20;
      ctx.shadowColor = color.rgb;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function roundedRectPath(left, top, right, bottom, r) {
      ctx.beginPath();
      ctx.moveTo(left + r, top);
      ctx.lineTo(right - r, top);
      ctx.arcTo(right, top, right, top + r, r);
      ctx.lineTo(right, bottom - r);
      ctx.arcTo(right, bottom, right - r, bottom, r);
      ctx.lineTo(left + r, bottom);
      ctx.arcTo(left, bottom, left, bottom - r, r);
      ctx.lineTo(left, top + r);
      ctx.arcTo(left, top, left + r, top, r);
      ctx.closePath();
    }

    function drawTier(x0, y0, x1, y1, colorA, colorB) {
      const pTL = tX(x0, y1), pBR = tX(x1, y0);
      const left = pTL.x, right = pBR.x, top = pTL.y, bottom = pBR.y;
      const r = Math.min(10 * cakeScale, (bottom - top) / 2);
      roundedRectPath(left, top, right, bottom, r);
      const grad = ctx.createLinearGradient(0, top, 0, bottom);
      grad.addColorStop(0, colorB);
      grad.addColorStop(1, colorA);
      ctx.save();
      ctx.fillStyle = grad;
      ctx.shadowBlur = 14;
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.fill();
      ctx.restore();

      // frosting drip
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(left, top + 6 * cakeScale);
      const drips = 7;
      const segW = (right - left) / drips;
      for (let i = 0; i <= drips; i++) {
        const dx = left + i * segW;
        const dy = top + (i % 2 === 0 ? 2 : 12) * cakeScale;
        ctx.lineTo(dx, dy);
      }
      ctx.lineTo(right, top);
      ctx.lineTo(left, top);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,250,245,0.9)';
      ctx.fill();
      ctx.restore();

      return { left, top, right, bottom };
    }

    function drawCandle() {
      const top = tX(0, 78), base = tX(0, 50);
      const left = tX(-4, 0).x, right = tX(4, 0).x;
      const w = right - left;
      ctx.save();
      const grad = ctx.createLinearGradient(left, 0, right, 0);
      grad.addColorStop(0, '#FFE66D');
      grad.addColorStop(1, '#FF9F1C');
      ctx.fillStyle = grad;
      ctx.fillRect(left, top.y, w, base.y - top.y);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      const stripes = 3;
      for (let i = 1; i <= stripes; i++) {
        const sy = top.y + (base.y - top.y) * (i / (stripes + 1));
        ctx.fillRect(left, sy, w, Math.max(1.5, 2 * cakeScale));
      }
      ctx.restore();
    }

    function drawSprinkle(s) {
      const p = tX(s.x, s.y);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = s.color.rgb;
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.ellipse(0, 0, s.r * cakeScale * 3.2, s.r * cakeScale * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawCakeFill() {
      const plate = tX(0, 0);
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#000000';
      ctx.filter = 'blur(6px)';
      ctx.beginPath();
      ctx.ellipse(plate.x, plate.y + 4 * cakeScale, 78 * cakeScale, 10 * cakeScale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.filter = 'none';
      ctx.restore();

      drawTier(-70, 0, 70, 28, '#FF3D5A', '#FF8FB3');
      drawTier(-45, 28, 45, 50, '#7B2FF7', '#B98BFF');

      for (const s of sprinkles) drawSprinkle(s);
      drawCandle();
    }

    function drawFlame(frame) {
      const tipX = cx + 0 * cakeScale;
      const tipY = cy - 97 * cakeScale;
      const midX = tipX;
      const midY = (tipY + cy - 78 * cakeScale) / 2;
      const flicker = 0.85 + 0.15 * Math.sin(frame * 0.3) + 0.05 * Math.sin(frame * 0.9);

      ctx.save();
      const grad = ctx.createRadialGradient(midX, midY, 0, midX, midY, 26 * flicker);
      grad.addColorStop(0, 'rgba(255,240,180,0.9)');
      grad.addColorStop(0.4, 'rgba(255,180,60,0.55)');
      grad.addColorStop(1, 'rgba(255,120,40,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(midX, midY, 26 * flicker, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(midX, midY - 2, 5 * flicker, 11 * flicker, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,250,220,0.95)';
      ctx.shadowBlur = 18;
      ctx.shadowColor = 'rgba(255,190,80,0.9)';
      ctx.fill();
      ctx.restore();
    }

    // ---- text reveal ----
    const LINE1 = "HAPPY BIRTHDAY";
    const LINE2 = "VIJI";
    let letters = [];
    let fontSize = 40;

    function layoutText() {
      let size = Math.max(20, Math.min(W(), H()) * 0.075);
      ctx.font = `700 ${size}px 'Fredoka', sans-serif`;
      
      const w1 = ctx.measureText(LINE1).width;
      const w2 = ctx.measureText(LINE2).width;
      const maxWidth = Math.max(w1, w2);
      const maxAllowed = W() * 0.92;
      
      let scale = 1;
      if (maxWidth > maxAllowed) {
        scale = maxAllowed / maxWidth;
        size = Math.max(14, size * scale);
        ctx.font = `700 ${size}px 'Fredoka', sans-serif`;
      }
      
      fontSize = size;
      const lineHeight = fontSize * 1.2;
      const startY = cy + 38 * cakeScale + fontSize * 0.6;
      
      letters = [];
      
      // Line 1
      const line1Width = ctx.measureText(LINE1).width;
      let acc1 = cx - line1Width / 2;
      for (let i = 0; i < LINE1.length; i++) {
        const ch = LINE1[i];
        const w = ctx.measureText(ch).width;
        letters.push({
          ch: ch,
          x: acc1 + w / 2,
          y: startY,
          w: w,
          revealFrame: null
        });
        acc1 += w;
      }
      
      // Line 2
      const line2Width = ctx.measureText(LINE2).width;
      let acc2 = cx - line2Width / 2;
      for (let i = 0; i < LINE2.length; i++) {
        const ch = LINE2[i];
        const w = ctx.measureText(ch).width;
        letters.push({
          ch: ch,
          x: acc2 + w / 2,
          y: startY + lineHeight,
          w: w,
          revealFrame: null
        });
        acc2 += w;
      }
    }
    layoutText();

    function easeOutBack(t) {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function drawText(frame) {
      ctx.save();
      ctx.font = `700 ${fontSize}px 'Fredoka', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < letters.length; i++) {
        const L = letters[i];
        if (L.revealFrame === null) continue;
        const t = Math.min((frame - L.revealFrame) / 18, 1);
        if (t < 0) continue;
        const scale = t < 1 ? Math.max(0, easeOutBack(t)) : 1 + Math.sin(frame * 0.05 + i) * 0.03;
        const c = colorAt(i / letters.length);
        ctx.save();
        ctx.translate(L.x, L.y);
        ctx.scale(scale, scale);
        ctx.globalAlpha = Math.min(t * 1.4, 1);
        ctx.shadowBlur = 24;
        ctx.shadowColor = c.rgb;
        ctx.fillStyle = c.rgb;
        ctx.fillText(L.ch, 0, 0);
        ctx.restore();
      }
      ctx.restore();
    }

    // ---- main loop state ----
    let drawProgress = 0;
    const DRAW_SPEED = 0.0032;
    let animId;
    let frameCount = 0;
    let completed = false;
    let completeFrame = 0;

    function spawnAmbient() {
      if (drawProgress < 0.05) return;
      const idx = Math.floor(Math.random() * Math.floor(drawProgress * TOTAL_PTS));
      const p = cakePath[idx];
      if (!p) return;
      const c = colorAt(idx / TOTAL_PTS);
      const ap = new Particle(p.x + (Math.random() - 0.5) * 70, p.y + (Math.random() - 0.5) * 70, c, 'trail');
      ap.decay = Math.random() * 0.004 + 0.001;
      ap.vx = (Math.random() - 0.5) * 0.4;
      ap.vy = (Math.random() - 0.5) * 0.4 - 0.15;
      ap.size = Math.random() * 1.6 + 0.2;
      particles.push(ap);
    }

    function animate() {
      animId = requestAnimationFrame(animate);
      frameCount++;

      ctx.fillStyle = 'rgba(9,6,20,0.19)';
      ctx.fillRect(0, 0, W(), H());

      drawStars(frameCount);

      for (const b of balloons) { b.update(); b.draw(); }
      for (const c of confetti) { c.update(); c.draw(); }

      if (!completed) {
        drawProgress = Math.min(drawProgress + DRAW_SPEED, 1);
        if (drawProgress >= 1) {
          completed = true;
          completeFrame = frameCount;
          pulsing = true;
          pulseRadius = 50;
          pulseAlpha = 0.9;
          for (let i = 0; i < letters.length; i++) {
            letters[i].revealFrame = completeFrame + i * 3 + 12;
          }
        }
      }

      const pts = Math.floor(drawProgress * TOTAL_PTS);
      drawCakeOutline(pts);

      if (!completed) {
        const headIdx = Math.max(0, pts - 1);
        const pos = cakePath[headIdx];
        const c = colorAt(drawProgress);
        drawHead(pos.x, pos.y, c);
      } else {
        drawFlame(frameCount);
      }

      if (frameCount % 2 === 0) spawnAmbient();
      drawPulse();

      if (completed) {
        if (Math.random() < 0.02 && fireworks.length < 4) {
          fireworks.push(new Firework());
        }
        fireworks = fireworks.filter(fw => !fw.update(frameCount));
        drawText(frameCount);
      }

      particles = particles.filter(p => p.life > 0);
      for (const p of particles) { p.update(); p.draw(frameCount); }
    }

    // ---- restart ----
    window.restart = function() {
      cancelAnimationFrame(animId);
      particles = [];
      fireworks = [];
      drawProgress = 0;
      frameCount = 0;
      completed = false;
      completeFrame = 0;
      pulsing = false;
      pulseRadius = 0;
      pulseAlpha = 0;
      for (const L of letters) L.revealFrame = null;
      initConfetti();
      initBalloons();
      ctx.clearRect(0, 0, W(), H());
      animate();
    };

    // ---- start ----
    initConfetti();
    initBalloons();
    animate();
  </script>
</body>
